name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install backend dependencies
      working-directory: ./server
      run: npm ci

    - name: Create logs directory
      working-directory: ./server
      run: mkdir -p logs

    - name: Run backend tests
      working-directory: ./server
      run: npm test
      env:
        NODE_ENV: test
        TEST_DATABASE_URL: mongodb://localhost:27017/hrm_test
        JWT_SECRET: test-jwt-secret-for-github-actions
        JWT_REFRESH_SECRET: test-refresh-secret-for-github-actions

    - name: Upload backend coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./server/coverage/lcov.info
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./client
      run: npm ci

    - name: Run frontend tests
      working-directory: ./client
      run: npm run test:run

    - name: Generate frontend coverage
      working-directory: ./client
      run: npm run test:coverage

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./client/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Audit backend dependencies
      working-directory: ./server
      run: npm audit --audit-level moderate

    - name: Audit frontend dependencies
      working-directory: ./client
      run: npm audit --audit-level moderate

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install backend dependencies
      working-directory: ./server
      run: npm ci

    - name: Build backend
      working-directory: ./server
      run: npm run build

    - name: Install frontend dependencies
      working-directory: ./client
      run: npm ci

    - name: Build frontend
      working-directory: ./client
      run: npm run build

    - name: Archive backend build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: backend-build
        path: server/dist

    - name: Archive frontend build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: client/dist

  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install frontend dependencies
      working-directory: ./client
      run: npm ci

    - name: Run frontend linting
      working-directory: ./client
      run: npm run lint

    # - name: Check TypeScript compilation
    #   working-directory: ./client
    #   run: npx tsc --noEmit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      working-directory: ./server
      run: npm ci

    - name: Start backend server
      working-directory: ./server
      run: |
        npm run dev &
        sleep 10
      env:
        NODE_ENV: test
        DATABASE_URL: mongodb://localhost:27017/hrm_integration_test
        JWT_SECRET: integration-test-jwt-secret
        JWT_REFRESH_SECRET: integration-test-refresh-secret
        PORT: 5001

    - name: Run integration tests
      working-directory: ./server
      run: npm run test:integration
      env:
        NODE_ENV: test
        TEST_DATABASE_URL: mongodb://localhost:27017/hrm_integration_test
        API_BASE_URL: http://localhost:5001

  deployment:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-test, security-scan, integration-tests]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "📦 Backend artifacts ready for deployment"
        echo "📦 Frontend artifacts ready for deployment"
        echo "✅ Deployment simulation completed"
        # Add your actual deployment commands here
        # Example: ansible-playbook deploy.yml
        # Example: docker push/deploy commands